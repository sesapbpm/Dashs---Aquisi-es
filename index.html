<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIMP-SESAP · Supply Chain & Analytics Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1b2a;
      --sidebar-bg: #0a1628;
      --surface: #1b263b;
      --accent: #52b788;
      --accent-glow: rgba(82, 183, 136, 0.15);
      --text: #e8f4f0;
      --muted: #8da9b4;
      --border: #243447;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Lato', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* Sidebar Styling */
    .sidebar {
      width: 280px;
      background-color: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      height: 100vh;
      z-index: 10;
      box-shadow: 10px 0 30px rgba(0, 0, 0, 0.3);
    }

    .brand {
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }

    .brand-logo {
      height: 44px;
      width: 44px;
      object-fit: contain;
      border-radius: 8px;
      background: white;
      padding: 4px;
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .brand-text {
      display: flex;
      flex-direction: column;
    }

    .brand-text h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.05rem;
      font-weight: 800;
      color: white;
      letter-spacing: 0.5px;
      line-height: 1.2;
    }

    .brand-text span {
      font-size: 0.65rem;
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 1px;
    }

    /* Nav Menu */
    .nav-menu {
      padding: 24px 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
      overflow-y: auto;
    }

    .nav-item {
      margin: 0 16px;
      padding: 12px 16px;
      border-radius: 10px;
      color: var(--muted);
      text-decoration: none;
      font-family: 'Poppins', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      border-left: 4px solid transparent;
      background-color: transparent;
    }

    .nav-item:hover {
      background-color: var(--surface);
      color: white;
      transform: translateX(4px);
    }

    .nav-item.active {
      background-color: rgba(82, 183, 136, 0.08);
      color: var(--accent);
      border-left-color: var(--accent);
      box-shadow: inset 4px 0 8px rgba(82, 183, 136, 0.02);
    }

    .nav-item .icon {
      font-size: 1.15rem;
      transition: transform 0.2s;
    }

    .nav-item:hover .icon {
      transform: scale(1.1);
    }

    /* Sidebar Footer */
    .sidebar-footer {
      padding: 20px 24px;
      border-top: 1px solid var(--border);
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.5px;
      text-align: center;
      background-color: rgba(0, 0, 0, 0.1);
    }

    /* Banner Styling */
    .banner-container {
      padding: 24px 28px 0;
      background-color: var(--bg);
    }

    .main-banner {
      width: 100%;
      aspect-ratio: 1024/74;
      background-image: url('banner.png');
      background-size: cover;
      background-position: center;
      border-radius: 12px;
      position: relative;
      display: flex;
      align-items: center;
      padding: 0 24px;
      overflow: hidden;
      box-shadow: inset 200px 0 150px rgba(10, 22, 40, 0.5), 0 4px 15px rgba(0, 0, 0, 0.25);
      border: 1px solid var(--border);
    }

    .main-banner::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(10, 22, 40, 0.4) 0%, transparent 100%);
      pointer-events: none;
    }

    .main-banner h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.35rem;
      font-weight: 800;
      color: white;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6);
      letter-spacing: 0.5px;
      z-index: 2;
    }

    /* Viewport */
    .viewport-container {
      flex: 1;
      height: 100vh;
      position: relative;
      background-color: var(--bg);
      display: flex;
      flex-direction: column;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background-color: var(--bg);
      display: block;
      transition: opacity 0.3s ease;
    }

    /* Loading indicator on Iframe change */
    .iframe-loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      pointer-events: none;
      z-index: 5;
    }

    .spinner {
      width: 42px;
      height: 42px;
      border: 3.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loader-text {
      font-size: 0.8rem;
      color: var(--muted);
      font-family: 'Poppins', sans-serif;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
      font-weight: 600;
    }

    /* Mobile Responsive */
    @media (max-width: 900px) {
      body {
        flex-direction: column;
      }
      
      .sidebar {
        width: 100%;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      }
      
      .brand {
        padding: 14px 20px;
        justify-content: center;
      }
      
      .brand-logo {
        height: 36px;
        width: 36px;
      }
      
      .nav-menu {
        flex-direction: row;
        padding: 6px 12px 10px;
        gap: 6px;
        overflow-x: auto;
        overflow-y: hidden;
        white-space: nowrap;
        -webkit-overflow-scrolling: touch;
      }
      
      .nav-item {
        margin: 0;
        padding: 8px 14px;
        font-size: 0.8rem;
        border-left: none;
        border-bottom: 3px solid transparent;
        border-radius: 6px;
        flex: 1;
        justify-content: center;
      }
      
      .nav-item:hover {
        transform: none;
      }
      
      .nav-item.active {
        border-left-color: transparent;
        border-bottom-color: var(--accent);
      }
      
      .sidebar-footer {
        display: none;
      }

      .banner-container {
        padding: 12px 12px 0;
      }

      .main-banner {
        aspect-ratio: auto;
        min-height: 70px;
        padding: 12px 16px;
        box-shadow: inset 0 0 100px rgba(10, 22, 40, 0.6);
      }

      .main-banner h1 {
        font-size: 1.05rem;
      }
      
      .viewport-container {
        height: calc(100vh - 120px);
        flex: 1;
      }

      .sidebar {
        position: relative;
      }

      .theme-toggle-container {
        position: absolute;
        top: 20px;
        right: 20px;
        padding: 0;
      }

      .theme-toggle-btn {
        padding: 8px 12px;
        font-size: 0.75rem;
      }

      .theme-toggle-btn .text {
        display: none;
      }
    }

    /* Theme Toggle */
    .theme-toggle-container {
      padding: 0 16px 16px;
      display: flex;
      flex-direction: column;
    }

    .theme-toggle-btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 16px;
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .theme-toggle-btn:hover {
      background-color: var(--surface);
      transform: translateY(-1px);
    }

    .theme-toggle-btn:active {
      transform: translateY(0);
    }

    /* Light Mode Overrides */
    body.light-mode {
      --bg: #f4f6f9;
      --sidebar-bg: #e9ecef;
      --surface: #ffffff;
      --text: #1b263b;
      --muted: #495057;
      --border: #dee2e6;
    }

    body.light-mode .brand-logo {
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.08);
      background: white;
    }

    body.light-mode .brand-text h1 {
      color: #1b263b;
    }

    body.light-mode .nav-item:hover {
      background-color: #dee2e6;
      color: #1b263b;
    }

    body.light-mode .nav-item.active {
      background-color: rgba(82, 183, 136, 0.12);
      color: #40916c;
      border-left-color: #40916c;
    }

    body.light-mode .theme-toggle-btn {
      color: #1b263b;
      border-color: #dee2e6;
    }

    body.light-mode .theme-toggle-btn:hover {
      background-color: #dee2e6;
    }

    body.light-mode .sidebar-footer {
      border-top-color: #dee2e6;
      background-color: rgba(0, 0, 0, 0.03);
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <img src="logo.png" alt="DIMP-SESAP" class="brand-logo">
      <div class="brand-text">
        <h1>DIMP-SESAP</h1>
        <span>Portal de Analytics</span>
      </div>
    </div>
    
    <nav class="nav-menu">
      <div class="nav-item active" onclick="switchDashboard(this, 'dashboard_sazonalidade_sesap.html')">
        <span class="icon">📦</span>
        <span>Sazonalidade</span>
      </div>
      <div class="nav-item" onclick="switchDashboard(this, 'dashboard_notas_sipac_sesap.html')">
        <span class="icon">📋</span>
        <span>Notas</span>
      </div>
      <div class="nav-item" onclick="switchDashboard(this, 'dashboard_inventario_sesap.html')">
        <span class="icon">📊</span>
        <span>Inventário</span>
      </div>
    </nav>
    
    <div class="theme-toggle-container">
      <button class="theme-toggle-btn" onclick="toggleTheme()" id="theme-btn">
        <span class="icon">☀️</span>
        <span class="text">Modo Claro</span>
      </button>
    </div>

    <div class="sidebar-footer">
      DIMP-SESAP · Portal v1.0
    </div>
  </aside>

  <!-- Viewport -->
  <main class="viewport-container">
    <!-- Banner -->
    <div class="banner-container">
      <div class="main-banner" id="main-banner">
        <h1 id="banner-title">DIMP-SESAP · Supply Chain Analytics</h1>
      </div>
    </div>

    <!-- Spinner loader overlay -->
    <div class="iframe-loader" id="iframe-loader">
      <div class="spinner"></div>
      <div class="loader-text">Carregando painel...</div>
    </div>
    
    <iframe id="dash-viewport" src="dashboard_sazonalidade_sesap.html" title="DIMP-SESAP Analytics Dashboard"></iframe>
  </main>

  <script>
    // ID central da planilha do Google Sheets (compartilhada como "Qualquer pessoa com o link pode ler")
    const SPREADSHEET_ID = 'INSIRA_O_ID_DA_SUA_PLANILHA_AQUI';

    const iframe = document.getElementById('dash-viewport');
    const loader = document.getElementById('iframe-loader');
    const navItems = document.querySelectorAll('.nav-item');
    const bannerTitle = document.getElementById('banner-title');
    let isLightMode = false;

    function switchDashboard(element, url) {
      if (element.classList.contains('active')) return;
      
      // Show loading micro-animation
      loader.style.display = 'flex';
      iframe.style.opacity = '0.15';
      
      // Update active nav state
      navItems.forEach(item => item.classList.remove('active'));
      element.classList.add('active');
      
      // Change source of the viewport
      iframe.src = url;

      // Update banner title based on dashboard
      if (url.includes('sazonalidade')) {
        bannerTitle.textContent = 'DIMP-SESAP · Supply Chain Analytics';
      } else if (url.includes('notas')) {
        bannerTitle.textContent = 'Dashboard de Governança SIPAC — Notas a Receber por Unidade de Saúde SESAP/RN';
      } else if (url.includes('inventario')) {
        bannerTitle.textContent = 'Inventario';
      }
    }

    function applyThemeToIframe() {
      if (iframe.contentWindow) {
        iframe.contentWindow.postMessage({ theme: isLightMode ? 'light' : 'dark' }, '*');
      }
    }

    function toggleTheme() {
      isLightMode = !isLightMode;
      document.body.classList.toggle('light-mode', isLightMode);
      
      const btn = document.getElementById('theme-btn');
      if (isLightMode) {
        btn.innerHTML = '<span class="icon">🌙</span><span class="text">Modo Escuro</span>';
      } else {
        btn.innerHTML = '<span class="icon">☀️</span><span class="text">Modo Claro</span>';
      }
      
      localStorage.setItem('theme', isLightMode ? 'light' : 'dark');
      applyThemeToIframe();
    }

    iframe.addEventListener('load', () => {
      // Hide loading animation and restore viewport opacity
      loader.style.display = 'none';
      iframe.style.opacity = '1';
      applyThemeToIframe();
    });

    // Listen to child iframe message requesting current theme state on load
    window.addEventListener('message', (event) => {
      if (event.data && event.data.requestTheme) {
        applyThemeToIframe();
      }
    });

    // Restore saved theme on page load
    window.addEventListener('load', () => {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'light') {
        toggleTheme();
      }
    });
  </script>
</body>
</html>
